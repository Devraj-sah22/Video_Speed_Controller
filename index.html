<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Speed Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎬 Video Speed Controller</h1>
    <p>Enter speed (0.1x to 10x):</p>
    <input type="number" id="speedInput" step="0.1" min="0.1" max="10" placeholder="e.g., 2.5">
    <button onclick="setSpeed()">Set Speed</button>
    <p class="note">Works on most video sites like YouTube.</p>
    <p class="developer">Developed by DEVRAJ</p>  
  </div>
  <script src="script.js"></script>
</body>
</html>
