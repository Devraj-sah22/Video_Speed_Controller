<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Video Speed Controller</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🎬 Speed Controller</h1>
    <input type="number" id="speedInput" placeholder="e.g., 1.5" step="0.1" min="0.1" max="10" />
    <button>Set Speed</button>

    <!-- ✅ Shortcut instruction -->
    <p class="hint">Press <strong>Shift + {;</strong> to increase speed, <strong>Shift + };</strong> to decrease by 0.25.</p>

    <p class="note">Developed by DEVRAJ</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
